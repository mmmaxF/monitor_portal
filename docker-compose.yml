services:
  postgres:
    image: postgres:16
    container_name: monitor_portal_postgres
    environment:
      POSTGRES_DB: monitor_db
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitor_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  web:
    build: .
    container_name: monitor_portal_web
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://monitor_user:monitor_pass@postgres:5432/monitor_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: